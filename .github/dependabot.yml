version: 2
updates:
  # GitHub Actions in the workflows (checkout, setup-python, cache, upload-artifact).
  # Keeps action majors current — and clears the recurring Node runtime deprecation.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"

  # Python dependencies. A single "/" entry covers both requirements.txt at the
  # root (pytest, pytest-cov, robotframework) and semantic_eval/requirements.txt
  # (torch, sentence-transformers) — pip discovery recurses, so a second
  # "/semantic_eval" entry would only produce duplicate PRs.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
