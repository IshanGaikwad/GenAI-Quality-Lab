name: AI Quality Gate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pytest evaluation suite (retrieval, groundedness, hallucination, prompt regression)
        run: pytest -v --cov=app --cov=evals --cov-report=term-missing --cov-fail-under=100

      - name: Robot Framework smoke suite
        run: robot --pythonpath . --outputdir robot-results robot/

      - name: Publish Robot Framework results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results
          path: robot-results/
